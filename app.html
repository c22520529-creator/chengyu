<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>成語練習</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  :root {
    --ink: #1a1612; 
    --ink-light: #6b5f52; 
    --ink-muted: #b0a498;
    --paper: #faf8f3; 
    --paper-warm: #f2ede3; 
    --paper-dark: #e8e0d0;
    --green: #2d6a4f; 
    --green-light: #d8f0e6;
    --red: #9b2226; 
    --red-light: #f8e0e1;
    --gold: #c77c2a; 
    --radius: 6px;
    --box-bg: #ffffff;
    --hdr: #1a1612;
    --hdr-t: #faf8f3;
    --nav: #1a1612;
  }

  body { 
    font-family: 'Noto Sans TC', sans-serif; 
    background: var(--paper); 
    color: var(--ink); 
    min-height: 100vh;
    overflow-x: hidden;
  }
  
  header {
    background: var(--hdr); color: var(--hdr-t);
    padding: 1.25rem 2rem;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    border-bottom: 3px solid var(--gold);
  }

  .header-title { font-family: 'Noto Serif TC', serif; font-size: 22px; font-weight: 700; letter-spacing: 0.15em; }
  .header-right { display: flex; align-items: center; gap: 1.5rem; }
  .prog-bar-outer { background: rgba(255,255,255,0.15); border-radius: 99px; height: 6px; width: 160px; overflow: hidden; margin-bottom: 4px; }
  .prog-bar-fill { height: 100%; background: var(--gold); border-radius: 99px; transition: width 0.4s ease; width: 0%; }
  .prog-text { font-size: 12px; color: rgba(255,255,255,0.65); }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #888; display: inline-block; margin-right: 5px; transition: background 0.3s; }
  .sync-dot.online { background: #4caf50; }
  .sync-status { font-size: 12px; color: rgba(255,255,255,0.6); display: flex; align-items: center; }
  
  .search-bar {
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
    border-radius: var(--radius); color: var(--paper);
    padding: 6px 12px; font-size: 14px; font-family: 'Noto Sans TC', sans-serif;
    width: 160px; outline: none;
  }
  .search-bar::placeholder { color: rgba(180,160,140,0.6); }
  .search-bar:focus { border-color: var(--gold); }

  /* 切換分頁按鈕 - 採用與頂欄、新增按鈕相同的紙墨深色風格 */
  .view-btn {
    background: var(--paper-warm); color: var(--ink); border: 1.5px solid var(--paper-dark); border-radius: var(--radius);
    padding: 6px 14px; font-size: 14px; cursor: pointer; font-weight: 500;
    transition: all 0.2s; display: flex; align-items: center; gap: 6px;
  }
  .view-btn:hover { background: var(--gold); color: #fff; border-color: var(--gold); }
  .view-btn:active { transform: scale(0.97); }

  main { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem 2rem; }
  .view-panel { display: none; }
  .view-panel.active { display: block; }

  /* --- 成語練習列表樣式 --- */
  .section-label {
    font-family: 'Noto Serif TC', serif; font-size: 13px; color: var(--gold);
    letter-spacing: 0.2em; margin: 2rem 0 0.75rem;
    padding-bottom: 0.4rem; border-bottom: 1px solid var(--paper-dark);
    display: flex; align-items: center; gap: 8px;
  }
  .section-label::before { content:''; display:inline-block; width:4px; height:14px; background:var(--gold); border-radius:2px; }

  .row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--paper-dark); flex-wrap: wrap; transition: opacity 0.3s; }
  .row:last-child { border-bottom: none; }
  .row.fading { opacity: 0; }
  .row.faded-in { animation: fadeIn 0.4s ease; }
  .row.done-row { background: var(--green-light); border-bottom-color: #b8dfc9; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .chengyu-label { font-family: 'Noto Serif TC', serif; font-size: 18px; font-weight: 500; min-width: 110px; letter-spacing: 0.08em; flex-shrink: 0; }
  .boxes { display: flex; align-items: center; gap: 8px; flex: 1; flex-wrap: wrap; }
  .box-unit { display: flex; align-items: center; gap: 5px; }
  .box {
    border: 1.5px solid var(--paper-dark); border-radius: var(--radius);
    padding: 5px 8px; font-size: 14px; font-family: 'Noto Sans TC', sans-serif;
    width: 100px; color: var(--ink); background: var(--box-bg); outline: none;
    transition: border-color 0.15s, background 0.15s;
  }
  .box::placeholder { color: var(--ink-muted); }
  .box:focus { border-color: var(--gold); box-shadow: 0 0 0 2px rgba(199,124,42,0.12); }
  .box.correct { border-color: var(--green); background: var(--green-light); color: var(--green); }
  .box.wrong { border-color: var(--red); background: var(--red-light); }
  .mini-check { font-size: 15px; color: var(--green); opacity: 0; transition: opacity 0.2s; flex-shrink: 0; }
  .mini-check.show { opacity: 1; }
  .done-tag {
    font-size: 11px; background: var(--green); color: #fff;
    border-radius: 99px; padding: 3px 10px; letter-spacing: 0.05em;
    opacity: 0; transition: opacity 0.3s; white-space: nowrap; font-weight: 500;
  }
  .done-tag.show { opacity: 1; }

  .del-btn {
    background: none; border: none; cursor: pointer;
    color: var(--ink-muted); font-size: 16px; padding: 2px 4px;
    border-radius: 4px; transition: color 0.15s, background 0.15s;
    flex-shrink: 0; line-height: 1;
  }
  .del-btn:hover { color: var(--red); background: var(--red-light); }

  /* --- 白底復刻版：日曆打卡介面樣式 --- */
  .calendar-container {
    background: var(--box-bg); border-radius: 12px; padding: 2rem;
    max-width: 650px; margin: 1rem auto;
    border: 1.5px solid var(--paper-dark);
    box-shadow: 0 4px 20px rgba(26,22,18,0.05);
  }
  .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
  .calendar-title { font-family: 'Noto Serif TC', serif; font-size: 20px; font-weight: 700; color: var(--ink); letter-spacing: 0.1em; display: flex; align-items: center; gap: 10px; }
  
  .calendar-arrows { display: flex; gap: 0.75rem; }
  .cal-arrow { 
    background: var(--paper); border: 1.5px solid var(--paper-dark); color: var(--ink); 
    width: 38px; height: 38px; border-radius: var(--radius); cursor: pointer; 
    display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all 0.15s; 
  }
  .cal-arrow:hover { background: var(--gold); border-color: var(--gold); color: #fff; }
  .cal-arrow:active { transform: scale(0.95); }
  
  .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; text-align: center; }
  .weekday-label { font-size: 13px; color: var(--ink-light); font-weight: 500; padding-bottom: 8px; border-bottom: 1px solid var(--paper-dark); }
  
  /* 日曆日期方格 - 採用與成語格子一致的極簡白底 */
  .cal-day {
    background: var(--box-bg); border: 1.5px solid var(--paper-dark); border-radius: var(--radius);
    aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 500; color: var(--ink); cursor: pointer; transition: all 0.15s; position: relative;
  }
  /* Hover 狀態：套用經典的古典金外框與淡黃襯底 */
  .cal-day:hover { border-color: var(--gold); background: var(--paper-warm); }
  .cal-day.empty { background: transparent; cursor: default; border: none; }
  .cal-day.empty:hover { background: transparent; }
  
  /* 當天有挑戰成功的日子：轉為打成語正確時的松石綠溫潤色調 */
  .cal-day.has-data { border-color: var(--green); background: var(--green-light); color: var(--green); }
  .cal-day.has-data:hover { background: #c2ebd9; border-color: #1b4332; }
  .cal-day .count-badge { font-size: 10px; background: var(--green); color: #fff; padding: 1px 6px; border-radius: 99px; margin-top: 4px; font-weight: 400; }
  
  /* 今天日期的外框高亮效果 */
  .cal-day.today { border-color: var(--gold); box-shadow: 0 0 0 2px rgba(199,124,42,0.2); font-weight: 700; }

  /* --- 彈出成果報表視窗 (Modal) --- */
  .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(26,22,18,0.4); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(2px); }
  .modal-overlay.show { display: flex; }
  .modal-card { background: var(--paper); color: var(--ink); width: 90%; max-width: 420px; border-radius: 12px; padding: 1.75rem; border-top: 5px solid var(--gold); box-shadow: 0 10px 30px rgba(0,0,0,0.15); animation: popUp 0.2s ease-out; }
  @keyframes popUp { from { transform: scale(0.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  
  .modal-title { font-family: 'Noto Serif TC', serif; font-size: 19px; font-weight: 700; margin-bottom: 1.25rem; color: var(--ink); border-bottom: 1px solid var(--paper-dark); padding-bottom: 0.6rem; }
  .modal-body { max-height: 260px; overflow-y: auto; margin-bottom: 1.5rem; }
  .modal-item { padding: 8px 4px; border-bottom: 1px dashed var(--paper-dark); font-size: 15px; display: flex; justify-content: space-between; align-items: center; }
  .modal-item:last-child { border-bottom: none; }
  .modal-close-btn { background: var(--ink); color: var(--paper); border: none; width: 100%; padding: 11px; border-radius: var(--radius); cursor: pointer; font-weight: 500; font-size: 14px; transition: background 0.15s; }
  .modal-close-btn:hover { background: var(--gold); color: #fff; }

  /* 新增成語區塊 */
  .add-section { max-width: 900px; margin: 0 auto 4rem; padding: 1.5rem; background: var(--box-bg); border: 1.5px dashed var(--paper-dark); border-radius: 10px; }
  .add-section-title { font-family: 'Noto Serif TC', serif; font-size: 15px; font-weight: 500; color: var(--gold); margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
  .add-section-title::before { content:'＋'; font-size: 16px; }
  .add-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .add-input { border: 1.5px solid var(--paper-dark); border-radius: var(--radius); padding: 7px 12px; font-size: 15px; font-family: 'Noto Serif TC', sans-serif; color: var(--ink); background: var(--paper); outline: none; flex: 1; min-width: 160px; transition: border-color 0.15s; }
  .add-input:focus { border-color: var(--gold); box-shadow: 0 0 0 2px rgba(199,124,42,0.12); }
  .add-input::placeholder { color: var(--ink-muted); font-size: 14px; }
  .add-btn { background: var(--ink); color: var(--paper); border: none; border-radius: var(--radius); padding: 8px 20px; font-size: 14px; font-family: 'Noto Sans TC', sans-serif; cursor: pointer; font-weight: 500; transition: background 0.15s; white-space: nowrap; }
  .add-btn:hover { background: var(--gold); }
  .add-hint { font-size: 12px; color: var(--ink-muted); margin-top: 8px; }
  .add-error { font-size: 12px; color: var(--red); margin-top: 6px; display: none; }

  .empty-msg { color: var(--ink-muted); font-size: 14px; padding: 1.5rem 0 0.5rem; text-align: center; }
  .search-add-wrap { text-align: center; padding: 0.75rem 0 2rem; }
  .search-add-btn { background: var(--ink); color: var(--paper); border: none; border-radius: var(--radius); padding: 9px 24px; font-size: 14px; font-family: 'Noto Sans TC', sans-serif; cursor: pointer; font-weight: 500; transition: background 0.15s; }
  .search-add-btn:hover { background: var(--gold); }

  @media (max-width: 600px) {
    header { flex-wrap: wrap; gap: 0.75rem; }
    .header-right { width: 100%; justify-content: space-between; }
    .search-bar { width: 110px; }
    .chengyu-label { min-width: 90px; font-size: 16px; }
    .box { width: 80px; }
    main { padding: 1rem 1rem 1rem; }
    .calendar-container { padding: 1rem; }
    .calendar-grid { gap: 8px; }
    .cal-day { font-size: 14px; }
  }

  /* 底部導覽列 */
  .bottom-nav {
    position: fixed !important; bottom: 0 !important; left: 0 !important; right: 0 !important;
    background: var(--nav);
    border-top: 2px solid var(--gold);
    display: flex; align-items: stretch;
    z-index: 9000; height: 64px;
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 3px; cursor: pointer;
    color: rgba(180,160,140,0.6);
    font-size: 11px; font-family: 'Noto Sans TC', sans-serif;
    border: none; background: none;
    transition: color 0.2s; padding: 8px 4px;
  }
  .nav-item svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .nav-item.active { color: var(--gold); }
  .nav-item:hover { color: rgba(180,160,140,0.9); }
  .nav-item.active:hover { color: var(--gold); }
  body { padding-bottom: 72px; }
  .add-section { margin-bottom: 1rem; }

  body.dark {
    --ink:#f0e6d8;--ink-light:#c4a882;--ink-muted:#7a6655;
    --paper:#1e1208;--paper-warm:#2a1a0e;--paper-dark:#3d2a1a;
    --green:#4caf82;--green-light:#0f2e1f;--red:#e06060;--red-light:#2e0f0f;
    --gold:#d4924a;--box-bg:#2a1a0e;--hdr:#120b04;--hdr-t:#f0e6d8;--nav:#120b04;
  }
  /* 暱稱/密碼畫面 */
  .nickname-screen{position:fixed;inset:0;background:var(--paper);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:1.1rem;}
  .nickname-title{font-family:'Noto Serif TC',serif;font-size:24px;font-weight:700;color:var(--ink);letter-spacing:.1em;}
  .nickname-sub{font-size:13px;color:var(--ink-muted);text-align:center;max-width:280px;}
  .nickname-input{border:1.5px solid var(--paper-dark);border-radius:8px;padding:10px 16px;font-size:15px;font-family:'Noto Sans TC',sans-serif;color:var(--ink);background:var(--box-bg);outline:none;width:240px;text-align:center;}
  .nickname-input:focus{border-color:var(--gold);}
  .nickname-btn{background:var(--gold);color:#fff;border:none;border-radius:8px;padding:10px 32px;font-size:15px;font-family:'Noto Sans TC',sans-serif;font-weight:500;cursor:pointer;}
  /* 聊天室 */
  .chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 200px);max-width:700px;margin:0 auto;}
  .chat-name-bar{font-size:12px;color:var(--ink-muted);padding:.5rem 0 .25rem;text-align:center;}
  .chat-name-bar span{color:var(--gold);font-weight:500;cursor:pointer;}
  .chat-messages{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding:.5rem 0;}
  .chat-bubble{max-width:72%;padding:9px 13px;border-radius:16px;font-size:14px;line-height:1.5;word-break:break-word;}
  .chat-bubble.me{align-self:flex-end;background:var(--gold);color:#fff;border-bottom-right-radius:4px;}
  .chat-bubble.other{align-self:flex-start;background:var(--box-bg);color:var(--ink);border:1px solid var(--paper-dark);border-bottom-left-radius:4px;}
  .bubble-name{font-size:11px;opacity:.7;margin-bottom:2px;}
  .bubble-time{font-size:10px;opacity:.6;margin-top:3px;text-align:right;}
  .chat-input-bar{display:flex;gap:8px;padding:.75rem 0;border-top:1px solid var(--paper-dark);}
  .chat-input{flex:1;border:1.5px solid var(--paper-dark);border-radius:20px;padding:8px 14px;font-size:14px;font-family:'Noto Sans TC',sans-serif;background:var(--box-bg);color:var(--ink);outline:none;}
  .chat-input:focus{border-color:var(--gold);}
  .chat-send{background:var(--gold);color:#fff;border:none;border-radius:20px;padding:8px 18px;font-size:14px;cursor:pointer;font-weight:500;}
  /* 設定 */
  .settings-inner{max-width:600px;margin:1.5rem auto;padding:0 1.5rem;}
  .settings-heading{font-family:'Noto Serif TC',serif;font-size:17px;font-weight:700;color:var(--ink);margin-bottom:1.25rem;}
  .settings-card{background:var(--box-bg);border:1.5px solid var(--paper-dark);border-radius:10px;padding:1.25rem;margin-bottom:1rem;}
  .settings-row{display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;}
  .settings-label{font-size:15px;color:var(--ink);font-weight:500;}
  .settings-sub{font-size:12px;color:var(--ink-muted);margin-top:2px;}
  .theme-btns{display:flex;gap:8px;}
  .theme-btn{padding:7px 16px;font-size:13px;border-radius:6px;border:1.5px solid var(--paper-dark);cursor:pointer;font-family:'Noto Sans TC',sans-serif;font-weight:500;transition:all .2s;background:var(--paper-warm);color:var(--ink);}
  .theme-btn.active{background:var(--gold);color:#fff;border-color:var(--gold);}
  /* 成語查詢視窗 */
  .def-overlay{position:fixed;inset:0;background:rgba(26,22,18,.5);display:none;align-items:flex-end;justify-content:center;z-index:9999;backdrop-filter:blur(2px);}
  .def-overlay.show{display:flex;}
  .def-card{background:var(--paper);width:100%;max-width:520px;border-radius:16px 16px 0 0;padding:1.5rem 1.5rem 2.5rem;border-top:4px solid var(--gold);animation:slideUp .25s ease-out;max-height:75vh;overflow-y:auto;}
  .def-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;}
  .def-title{font-family:'Noto Serif TC',serif;font-size:22px;font-weight:700;color:var(--ink);letter-spacing:.1em;}
  .def-close{background:var(--paper-warm);border:1px solid var(--paper-dark);border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--ink-light);}
  .def-section{margin-bottom:1rem;}
  .def-section-title{font-size:11px;font-weight:600;color:var(--gold);letter-spacing:.15em;margin-bottom:.4rem;}
  .def-section-content{color:var(--ink);font-size:14px;line-height:1.8;}
  .def-loading{display:flex;align-items:center;gap:10px;color:var(--ink-muted);font-size:14px;padding:1.5rem 0;}
  .def-spinner{width:18px;height:18px;border:2px solid var(--paper-dark);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .chengyu-label:hover{color:var(--gold);}

  .stat-overlay{position:fixed;inset:0;background:rgba(26,22,18,.5);display:none;align-items:flex-end;justify-content:center;z-index:1000;}
  .stat-overlay.show{display:flex;}
  .stat-card{background:var(--paper);width:100%;max-width:520px;border-radius:16px 16px 0 0;padding:1.5rem 1.5rem 2rem;border-top:4px solid var(--gold);animation:slideUp .25s ease-out;max-height:80vh;overflow-y:auto;}
  @keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
  .stat-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;}
  .stat-title{font-family:'Noto Serif TC',serif;font-size:18px;font-weight:700;color:var(--ink);}
  .stat-close{background:var(--paper-warm);border:1px solid var(--paper-dark);border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--ink-light);}
  .stat-row{display:flex;justify-content:space-between;padding:.6rem 0;border-bottom:1px solid var(--paper-dark);font-size:14px;color:var(--ink);}
  .stat-row:last-child{border-bottom:none;}
  .stat-val{font-weight:600;color:var(--gold);}
</style>
<script>
window.onerror = function(msg, src, line, col, err) {
  // 吞掉 Firebase 安全性錯誤，讓其他程式繼續執行
  if (msg && msg.indexOf('Unsafe attempt') !== -1) return true;
  if (msg && msg.indexOf('file:') !== -1) return true;
  return false;
};
</script>
</head>
<body>

<div id="brightness-wrap">
<header>
  <span class="header-title">成語練習</span>
  <div class="header-right">
    <input class="search-bar" type="text" id="search" placeholder="搜尋成語…" oninput="filterList(this.value)">
    <span class="sync-status"><span class="sync-dot" id="sync-dot"></span><span id="sync-label">連線中…</span></span>
    <div>
      <div class="prog-bar-outer"><div class="prog-bar-fill" id="prog-bar"></div></div>
      <div class="prog-text" id="prog-text">完成 0 / 0</div>
    </div>
  </div>
</header>

<main>
  <div id="practice-panel" class="view-panel active">
    <div id="list"></div>
  </div>

  <div id="calendar-panel" class="view-panel">
    <div class="calendar-container">
      <div class="calendar-header">
        <div class="calendar-title">📅 <span id="cal-month-title">2026 年 5 月</span></div>
        <div class="calendar-arrows">
          <button class="cal-arrow" onclick="changeMonth(-1)">◀</button>
          <button class="cal-arrow" onclick="changeMonth(1)">▶</button>
        </div>
      </div>
      <div class="calendar-grid" id="calendar-grid"></div>

// ===== Firebase 設定 =====
const firebaseConfig = {
  databaseURL: "https://chengyu-practice-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const progressRef = db.ref('progress');
const customRef = db.ref('custom');
const historyRef = db.ref('history'); // 用於紀錄每日全對通關成語的專屬歷史打卡節點

// 同步狀態顯示
db.ref('.info/connected').on('value', function(snap) {
  const dot = document.getElementById('sync-dot');
  const label = document.getElementById('sync-label');
  if (snap.val()) {
    dot.classList.add('online');
    label.textContent = '已同步';
  } else {
    dot.classList.remove('online');
    label.textContent = '離線中';

const allBase = [...new Set(raw.split('|').map(s=>s.trim()).filter(Boolean))];
let custom = [];
let completed = {};
let historyData = {}; // 存放每日打卡成果

let currentYear = 2026;
let currentMonth = 4; // 預設停在 5 月 (0是一月)

// 禁止複製貼上
const preventDefaultActions = e => e.preventDefault();
['copy', 'paste', 'cut', 'contextmenu'].forEach(evt => document.addEventListener(evt, preventDefaultActions));

function allList() { return allBase.concat(custom); }

function getFirebaseKey(chengyu) {
  return encodeURIComponent(chengyu).replace(/\./g, '%2E');
}

function updateProgress() {
  const list = allList();
  const done = list.filter(w => completed[w]).length;
  const rate = list.length ? (done / list.length * 100) : 0;
  document.getElementById('prog-bar').style.width = rate + '%';
  document.getElementById('prog-text').textContent = `完成 ${done} / ${list.length}`;
}

function saveProgress(chengyu, val) {
  const key = getFirebaseKey(chengyu);
  progressRef.child(key).set(val);

  // 當三遍都答對時，自動在 history 節點上記錄當天打卡日期與時間
  if (val === true) {
    const today = new Date();
    const y = today.getFullYear();
    const m = String(today.getMonth() + 1).padStart(2, '0');
    const d = String(today.getDate()).padStart(2, '0');
    const dateStr = `${y}-${m}-${d}`;
    
    historyRef.child(dateStr).child(key).set({
      name: chengyu,
      time: today.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
      ts: today.getTime()
    });
  }
}

function saveCustom() {
  customRef.set(custom);
}

// 監聽歷史打卡進度
historyRef.on('value', function(snap) {
  historyData = snap.val() || {};
  if (document.getElementById('calendar-panel').classList.contains('active')) {
    renderCalendar();
  }
});

// 監聽主挑戰進度
progressRef.on('value', function(snap) {
  const data = snap.val() || {};
  completed = {};
  
  allList().forEach(function(w) {
    const key = getFirebaseKey(w);
    if (data[key]) completed[w] = true;
  });
  
  updateProgress();
  
  document.querySelectorAll('.row').forEach(function(row) {
    const cy = row.dataset.chengyu;
    if (!cy) return;
    const tag = row.querySelector('.done-tag');
    const allInputs = row.querySelectorAll('.box');
    const checks = row.querySelectorAll('.mini-check');
    
    if (completed[cy]) {
      if (tag) tag.classList.add('show');
      row.classList.add('done-row');
      allInputs.forEach(inp => {
        inp.readOnly = true;
        inp.className = 'box correct';
        inp.value = cy;
      });
      checks.forEach(ck => {
        ck.textContent = '✓';
        ck.classList.add('show');
      });
    }
  });
});

// 監聽自訂成語
customRef.on('value', function(snap) {
  const data = snap.val();
  if (!data) { custom = []; }
  else if (Array.isArray(data)) { custom = data; }
  else { custom = Object.values(data); }
  renderList(document.getElementById('search').value);
});

function makeRow(chengyu, deletable) {
  const row = document.createElement('div');
  row.className = 'row' + (completed[chengyu] ? ' done-row' : '');
  row.dataset.chengyu = chengyu;

  const lbl = document.createElement('span');
  lbl.className = 'chengyu-label';
  lbl.textContent = chengyu;
  lbl.style.cursor = 'pointer';
  lbl.setAttribute('data-cy', chengyu);
  lbl.title = '點我查注音和意思';
  lbl.addEventListener('click', function(e) {
    e.stopPropagation();
    var cy = this.getAttribute('data-cy');
    openDefinition(cy);
  });
  row.appendChild(lbl);

  const boxes = document.createElement('div');
  boxes.className = 'boxes';

  const allInputs = [], checks = [];

  for (let i = 0; i < 3; i++) {
    const unit = document.createElement('div');
    unit.className = 'box-unit';
    const inp = document.createElement('input');
    inp.type = 'text'; 
    inp.className = 'box'; 
    inp.placeholder = chengyu;

    ['copy', 'paste', 'cut', 'contextmenu'].forEach(evt => inp.addEventListener(evt, preventDefaultActions));

    allInputs.push(inp);
    const ck = document.createElement('span');
    ck.className = 'mini-check';
    checks.push(ck);
    unit.appendChild(inp); 
    unit.appendChild(ck);
    boxes.appendChild(unit);
  }

  const doneTag = document.createElement('span');
  doneTag.className = 'done-tag' + (completed[chengyu] ? ' show' : '');
  doneTag.textContent = '已完成';
  boxes.appendChild(doneTag);

  if (completed[chengyu]) {
    allInputs.forEach(function(inp) { inp.readOnly = true; inp.className = 'box correct'; inp.value = chengyu; });
    checks.forEach(function(ck) { ck.textContent = '✓'; ck.classList.add('show'); });
  }

  allInputs.forEach(function(inp, idx) {
    inp.addEventListener('input', function() {
      const val = inp.value.trim();
      if (val === '') { 
        inp.className = 'box'; 
        checks[idx].textContent = ''; 
        checks[idx].classList.remove('show'); 
      }
      else if (val === chengyu) {
        inp.className = 'box correct'; 
        checks[idx].textContent = '✓'; 
        checks[idx].classList.add('show');
        inp.readOnly = true;
        if (idx < 2 && allInputs[idx + 1].value.trim() !== chengyu) {
          allInputs[idx + 1].focus();
        }
      }
      else { 
        inp.className = 'box wrong'; 
        checks[idx].textContent = ''; 
        checks[idx].classList.remove('show'); 
      }

      const allCorrect = allInputs.every(b => b.value.trim() === chengyu);
      if (allCorrect) {
        if (!completed[chengyu]) {
          completed[chengyu] = true;
          saveProgress(chengyu, true);
          updateProgress();
          doneTag.classList.add('show');
          row.classList.add('fading');
          setTimeout(function() {
            const parent = row.parentNode;
            if (parent) {
              parent.appendChild(row);
              row.classList.remove('fading');
              row.classList.add('done-row', 'faded-in');
              setTimeout(function() { row.classList.remove('faded-in'); }, 400);
            }
          }, 300);
        } else {
          doneTag.classList.add('show');
        }
      } else {
        if (completed[chengyu]) { 
          completed[chengyu] = false; 
          saveProgress(chengyu, false); 
          updateProgress(); 
        }
        doneTag.classList.remove('show');
        row.classList.remove('done-row');
      }
    });
  });

  row.appendChild(boxes);

  if (deletable) {
    const del = document.createElement('button');
    del.className = 'del-btn'; del.textContent = '✕';
    del.onclick = function(e) {
      e.stopPropagation();
      custom = custom.filter(w => w !== chengyu);
      if (completed[chengyu]) { completed[chengyu] = false; saveProgress(chengyu, false); }
      saveCustom();
      row.remove();
      updateProgress();
    };
    row.appendChild(del);
  }

  return row;
}

function renderList(filter) {
  filter = (filter || '').trim();
  const container = document.getElementById('list');
  container.innerHTML = ''; 

  const fragment = document.createDocumentFragment();
  let shownAny = false;
  const filtered = allBase.filter(w => !filter || w.includes(filter));
  if (filtered.length) { shownAny = true; filtered.forEach(function(w) { fragment.appendChild(makeRow(w, false)); }); }

  const filteredCustom = custom.filter(w => !filter || w.includes(filter));
  if (filteredCustom.length > 0) {
    shownAny = true;
    const customSec = document.createElement('div');
    customSec.id = 'custom-section';
    const customLbl = document.createElement('div');
    customLbl.className = 'section-label'; customLbl.textContent = '自訂成語';
    customSec.appendChild(customLbl);

    filteredCustom.forEach(function(w) { customSec.appendChild(makeRow(w, true)); });
    fragment.appendChild(customSec);
  }

  if (!shownAny && filter) {
    const msg = document.createElement('p');
    msg.className = 'empty-msg'; msg.textContent = `找不到「${filter}」`;
    fragment.appendChild(msg);

    const addWrap = document.createElement('div');
    addWrap.className = 'search-add-wrap';
    const addBtn = document.createElement('button');
    addBtn.className = 'search-add-btn'; addBtn.textContent = `＋ 新增「${filter}」`;
    addBtn.onclick = function() {
      document.getElementById('new-chengyu').value = filter;
      addChengyu();
      document.getElementById('search').value = '';
      renderList('');
    };
    addWrap.appendChild(addBtn);
    fragment.appendChild(addWrap);
  }

  container.appendChild(fragment);
  updateProgress();
}

function addChengyu() {
  const input = document.getElementById('new-chengyu');
  const errEl = document.getElementById('add-error');
  const val = input.value.trim();
  errEl.style.display = 'none';
  if (!val) { errEl.textContent = '請輸入成語'; errEl.style.display = 'block'; return; }
  if (allList().includes(val)) { errEl.textContent = `「${val}」已存在`; errEl.style.display = 'block'; return; }
  
  custom.push(val);
  saveCustom();
  input.value = '';
  document.getElementById('search').value = '';
  renderList('');

  setTimeout(() => {
    const sec = document.getElementById('custom-section');
    if (sec) sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

document.getElementById('new-chengyu').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') addChengyu();
});

function changeMonth(direction) {
  currentMonth += direction;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  else if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  renderCalendar();
}

// 動態繪製與主介面完全一致的白底行事曆
function renderCalendar() {
  const grid = document.getElementById('calendar-grid');
  const monthTitle = document.getElementById('cal-month-title');
  grid.innerHTML = '';

  const monthNames = ["1 月", "2 月", "3 月", "4 月", "5 月", "6 月", "7 月", "8 月", "9 月", "10 月", "11 月", "12 月"];
  monthTitle.textContent = `${currentYear} 年 ${monthNames[currentMonth]}`;

  const weekdays = ['一', '二', '三', '四', '五', '六', '日'];
  weekdays.forEach(day => {
    const el = document.createElement('div');
    el.className = 'weekday-label'; el.textContent = day;
    grid.appendChild(el);
  });

  const firstDay = new Date(currentYear, currentMonth, 1);
  let startDayIndex = firstDay.getDay(); 
  if (startDayIndex === 0) startDayIndex = 7; // 週日排在最後

  const totalDays = new Date(currentYear, currentMonth + 1, 0).getDate();

  // 空白填充
  for (let i = 1; i < startDayIndex; i++) {
    const emptyCell = document.createElement('div');
    emptyCell.className = 'cal-day empty';
    grid.appendChild(emptyCell);
  }

  const today = new Date();

  for (let day = 1; day <= totalDays; day++) {
    const dayCell = document.createElement('div');
    dayCell.className = 'cal-day'; dayCell.textContent = day;

    const mStr = String(currentMonth + 1).padStart(2, '0');
    const dStr = String(day).padStart(2, '0');
    const dateKey = `${currentYear}-${mStr}-${dStr}`;

    // 如果這一天有通關紀錄，套用成語答對時的松石綠底色
    if (historyData[dateKey]) {
      dayCell.classList.add('has-data');
      const count = Object.keys(historyData[dateKey]).length;
      const badge = document.createElement('span');
      badge.className = 'count-badge'; badge.textContent = `完成 ${count}`;
      dayCell.appendChild(badge);
    }

    // 今天日期加上古典金微調外框
    if (today.getFullYear() === currentYear && today.getMonth() === currentMonth && today.getDate() === day) {
      dayCell.classList.add('today');
    }

    dayCell.onclick = function() {
      showDayStats(dateKey);
    };

    grid.appendChild(dayCell);
  }
}

function showModal(dateStr, dayData) {
  const overlay = document.getElementById('modal-overlay');
  const title = document.getElementById('modal-date-title');
  const body = document.getElementById('modal-list-body');
  
  const formattedDate = dateStr.replace(/-/, '年').replace(/-/, '月') + '日';
  title.textContent = `📅 ${formattedDate} 成果報告`;
  body.innerHTML = '';

  if (!dayData) {
    body.innerHTML = `<p style="color:var(--ink-light); text-align:center; padding:1.8rem 0; font-size:14px;">這天沒有挑戰成語喔 🤫</p>`;
  } else {
    for (const key in dayData) {
      const item = document.createElement('div');
      item.className = 'modal-item';
      item.innerHTML = `<span>🟢 <b>${dayData[key].name}</b></span> <span style="font-size:12px; color:var(--ink-light);">${dayData[key].time} 挑戰成功</span>`;
      body.appendChild(item);
    }
  }
  overlay.classList.add('show');
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('show'); }

// ===== 聊天室 =====
var chatRef = firebase.database().ref('chat');
var chatInited = false;

function initChat() {
  if (chatInited) return;
  chatInited = true;
  chatRef.limitToLast(80).on('child_added', function(snap) { renderMsg(snap.val()); });
}

function renderMsg(msg) {
  var box = document.getElementById('chat-messages');
  if (!box) return;
  var isMe = msg.name === myNickname;
  var div = document.createElement('div');
  div.className = 'chat-bubble ' + (isMe ? 'me' : 'other');
  var t = new Date(msg.ts).toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
  div.innerHTML = (!isMe ? '<div class="bubble-name">'+esc(msg.name)+'</div>' : '') +
    '<div>'+esc(msg.text)+'</div><div class="bubble-time">'+t+'</div>';
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function sendMessage() {
  if (!myNickname) { document.getElementById('nickname-screen').style.display='flex'; return; }
  var input = document.getElementById('chat-input');
  var text = (input.value||'').trim();
  if (!text) return;
  chatRef.push({ name: myNickname, text: text, ts: Date.now() });
  input.value = '';
}

document.addEventListener('keydown', function(e) {
  if (e.key==='Enter' && document.activeElement && document.activeElement.id==='chat-input') sendMessage();
  if (e.key==='Enter' && document.activeElement && document.activeElement.classList.contains('nickname-input')) saveNickname();
});

var _sw = switchTab;
switchTab = function(tab) { _sw(tab); if (tab==='chat') initChat(); };

// ===== 統計彈窗 =====
function showDayStats(dateKey) {
  var data = historyData[dateKey] || {};
  var keys = Object.keys(data);
  var totalWords = keys.length;
  var totalChars = keys.reduce(function(sum, k) { return sum + (data[k].name ? data[k].name.length : 0); }, 0);

  // 計算花費時間（最早到最晚的 timestamp 差）
  var timestamps = keys.map(function(k){ return data[k].ts || 0; }).filter(Boolean);
  var durationStr = '無紀錄';
  if (timestamps.length >= 2) {
    var minTs = Math.min.apply(null, timestamps);
    var maxTs = Math.max.apply(null, timestamps);
    var diffMs = maxTs - minTs;
    var diffMin = Math.floor(diffMs / 60000);
    var diffSec = Math.floor((diffMs % 60000) / 1000);
    if (diffMin > 0) {
      durationStr = diffMin + ' 分 ' + diffSec + ' 秒';
    } else {
      durationStr = diffSec + ' 秒';
    }
  } else if (timestamps.length === 1) {
    durationStr = '不到 1 分鐘';
  }

  var d = new Date(dateKey);
  var title = (d.getMonth()+1) + '月' + d.getDate() + '日 統計';
  document.getElementById('stat-date-title').textContent = title;

  var body = document.getElementById('stat-body');
  if (totalWords === 0) {
    body.innerHTML = '<p style="color:var(--ink-muted);font-size:14px;padding:1rem 0;">這天沒有打卡紀錄</p>';
  } else {
    body.innerHTML =
      '<div class="stat-row"><span>完成成語</span><span class="stat-val">'+totalWords+' 個</span></div>' +
      '<div class="stat-row"><span>練習字數</span><span class="stat-val">'+(totalChars*3)+' 字（共 '+totalWords+' 個成語 × 3遍）</span></div>' +
      '<div class="stat-row"><span>花費時間</span><span class="stat-val">'+durationStr+'</span></div>' +
      '<div style="margin-top:1rem;font-size:13px;color:var(--ink-muted);">完成的成語：</div>' +
      '<div style="font-size:14px;color:var(--ink);line-height:2;margin-top:4px;">' +
      keys.map(function(k){ return data[k].name || k; }).join('　') + '</div>';
  }
  document.getElementById('stat-overlay').classList.add('show');
}

function closeStatOverlay() {
  document.getElementById('stat-overlay').classList.remove('show');
}

// ===== 主題與亮度 =====
function setTheme(mode) {
  if (mode==='dark') {
    document.body.classList.add('dark');
    document.getElementById('btn-dark').classList.add('active');
    document.getElementById('btn-light').classList.remove('active');
  } else {
    document.body.classList.remove('dark');
    document.getElementById('btn-light').classList.add('active');
    document.getElementById('btn-dark').classList.remove('active');
  }
  localStorage.setItem('cy-theme', mode);
}
function setBrightness(val) {
  document.getElementById('brightness-wrap').style.filter = 'brightness('+val+'%)';
  document.getElementById('brightness-val').textContent = val+'%';
  localStorage.setItem('cy-brightness', val);
}
(function(){
  var t = localStorage.getItem('cy-theme');
  if (t==='dark') setTheme('dark');
  var b = localStorage.getItem('cy-brightness');
  if (b) { document.getElementById('brightness-slider').value=b; setBrightness(b); }
  initNickname();
})();


var defCache = {};

function openDefinition(chengyu) {
  var overlay = document.getElementById('def-overlay');
  var titleEl = document.getElementById('def-title');
  var bodyEl = document.getElementById('def-body');
  if (!overlay || !titleEl || !bodyEl) { alert(chengyu + '\n（注音功能載入中，請稍後再試）'); return; }
  titleEl.textContent = chengyu;
  overlay.classList.add('show');

  var entry = DICT[chengyu];
  if (entry) {
    bodyEl.innerHTML =
      '<div class="def-section"><div class="def-section-title">注　音</div><div class="def-section-content" style="font-size:16px;letter-spacing:.05em;">'+entry.z+'</div></div>' +
      '<div class="def-section"><div class="def-section-title">意　思</div><div class="def-section-content">'+entry.m+'</div></div>' +
      '<div class="def-section"><div class="def-section-title">例　句</div><div class="def-section-content">'+entry.e+'</div></div>';
    return;
  }

  // 字典沒有的，用 AI 查
  if (defCache[chengyu]) { renderDefText(defCache[chengyu]); return; }
  bodyEl.innerHTML = '<div class="def-loading"><div class="def-spinner"></div>查詢中…</div>';
  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 600,
      messages: [{ role: 'user', content: '請用繁體中文說明成語「'+chengyu+'」，只輸出以下三部分：\n【注音】\n【意思】\n【例句】' }]
    })
  })
  .then(function(r){ return r.json(); })
  .then(function(data){
    var text = (data.content && data.content[0] && data.content[0].text) || '查詢失敗';
    defCache[chengyu] = text;
    renderDefText(text);
  })
  .catch(function(){ bodyEl.innerHTML = '<p style="color:var(--red)">查詢失敗，請確認網路連線</p>'; });
}

function renderDefText(text) {
  var bodyEl = document.getElementById('def-body');
  var sections = [
    { key:'【注音】', label:'注　音' },
    { key:'【意思】', label:'意　思' },
    { key:'【例句】', label:'例　句' }
  ];
  var html = '';
  sections.forEach(function(s) {
    var idx = text.indexOf(s.key);
    if (idx === -1) return;
    var end = text.length;
    sections.forEach(function(s2) {
      if (s2.key === s.key) return;
      var i2 = text.indexOf(s2.key);
      if (i2 > idx && i2 < end) end = i2;
    });
    html += '<div class="def-section"><div class="def-section-title">'+s.label+'</div><div class="def-section-content">'+text.slice(idx+s.key.length,end).trim()+'</div></div>';
  });
  bodyEl.innerHTML = html || '<p>'+text+'</p>';
}

function closeDefinition(e) {
  if (e && e.target !== document.getElementById('def-overlay')) return;
  document.getElementById('def-overlay').classList.remove('show');
}
